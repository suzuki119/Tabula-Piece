<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Tabula-Piece</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-card">
  <div class="login-logo">Tabula-Piece</div>
  <div class="login-sub">チェス × ソシャゲ 対戦ゲーム</div>

  <!-- ログインフォーム -->
  <div class="form-section" id="section-login">
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input class="form-input" type="email" id="login-email" placeholder="example@mail.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">パスワード</label>
      <input class="form-input" type="password" id="login-password" placeholder="6文字以上" autocomplete="current-password">
    </div>
    <div class="form-error" id="login-error"></div>
    <button class="btn-primary" id="btn-login">ログイン</button>
    <div class="toggle-link">
      アカウントをお持ちでない方は
      <a onclick="showRegister()">新規登録</a>
    </div>
  </div>

  <!-- 新規登録フォーム -->
  <div class="form-section hidden" id="section-register">
    <div class="form-group">
      <label class="form-label">表示名</label>
      <input class="form-input" type="text" id="reg-name" placeholder="ゲーム内での名前" maxlength="24">
    </div>
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input class="form-input" type="email" id="reg-email" placeholder="example@mail.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">パスワード</label>
      <input class="form-input" type="password" id="reg-password" placeholder="6文字以上" autocomplete="new-password">
    </div>
    <div class="form-error" id="reg-error"></div>
    <button class="btn-primary" id="btn-register">アカウント作成</button>
    <div class="toggle-link">
      すでにアカウントをお持ちの方は
      <a onclick="showLogin()">ログイン</a>
    </div>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
