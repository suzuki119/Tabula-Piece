<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対戦 — Tabula-Piece</title>
  <link rel="stylesheet" href="css/board.css">
</head>
<body>

<!-- スキル発動通知 -->
<div id="skill-notice"></div>

<div class="match-container">

  <!-- 相手プレイヤーバー -->
  <div class="player-bar" id="opp-bar">
    <div>
      <div class="player-name" id="opp-name">相手</div>
      <div class="player-color" id="opp-color">黒</div>
    </div>
    <div class="player-score">
      <div class="score-value" id="opp-score">0</div>
      <div class="score-label">ポイント</div>
    </div>
  </div>

  <!-- チェスボード -->
  <div class="board-wrapper">
    <!-- 列ラベル (上) -->
    <div class="board-coords-top">
      <div></div>
      <div class="coord-label">a</div>
      <div class="coord-label">b</div>
      <div class="coord-label">c</div>
      <div class="coord-label">d</div>
      <div class="coord-label">e</div>
      <div class="coord-label">f</div>
    </div>

    <div class="board-inner">
      <div></div>
      <!-- マスはboard.jsで動的生成 -->
      <div class="board-grid" id="board-grid"></div>
    </div>

    <!-- 列ラベル (下) -->
    <div class="board-coords-bottom">
      <div></div>
      <div class="coord-label">a</div>
      <div class="coord-label">b</div>
      <div class="coord-label">c</div>
      <div class="coord-label">d</div>
      <div class="coord-label">e</div>
      <div class="coord-label">f</div>
    </div>
  </div>

  <!-- 自分プレイヤーバー -->
  <div class="player-bar" id="my-bar">
    <div>
      <div class="player-name" id="my-name">あなた</div>
      <div class="player-color" id="my-color">白</div>
    </div>
    <div class="player-score">
      <div class="score-value" id="my-score">0</div>
      <div class="score-label">ポイント</div>
    </div>
  </div>

  <!-- ゲーム情報パネル -->
  <div class="info-panel">
    <div class="info-item">
      <span class="label">ターン</span>
      <span class="value"><span id="turn-num">1</span><span style="font-size:13px;color:var(--text-muted)">/<span id="max-turns">30</span></span></span>
    </div>
    <div class="info-item">
      <span class="label">残り時間</span>
      <span class="value" id="timer-value">60</span>
    </div>
    <div class="info-item">
      <span class="label">状態</span>
      <span class="value" style="font-size:13px" id="turn-banner">読み込み中</span>
    </div>
  </div>

  <!-- 選択中の駒パネル（スキル情報含む） -->
  <div class="piece-panel empty" id="piece-panel">
    <span class="piece-hint">駒を選択してください</span>
  </div>

</div>

<!-- 試合結果オーバーレイ -->
<div class="overlay" id="result-overlay">
  <div class="overlay-card">
    <div class="result-icon" id="result-icon">🏆</div>
    <div class="result-title" id="result-title">勝利！</div>
    <div class="result-reason" id="result-reason"></div>
    <a href="/" class="btn">ホームへ戻る</a>
  </div>
</div>

<script src="js/chess.js"></script>
<script src="js/board.js"></script>
</body>
</html>
