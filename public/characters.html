<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャラクター一覧 — Tabula-Piece</title>
  <link rel="stylesheet" href="css/deck.css">
</head>
<body>

<header class="page-header">
  <div class="page-title">キャラクター</div>
  <nav class="nav-links">
    <a href="decks.html">デッキ編成</a>
    <span id="user-name" class="nav-user"></span>
    <button id="logout-btn" class="nav-logout">ログアウト</button>
  </nav>
</header>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-class="all">すべて</button>
  <button class="filter-btn" data-class="pawn">♟ ポーン</button>
  <button class="filter-btn" data-class="knight">♞ ナイト</button>
  <button class="filter-btn" data-class="bishop">♝ ビショップ</button>
  <button class="filter-btn" data-class="rook">♜ ルーク</button>
  <button class="filter-btn" data-class="queen">♛ クイーン</button>
  <button class="filter-btn" data-class="king">♚ キング</button>
</div>

<div class="char-grid" id="char-grid">
  <div class="loading">読み込み中…</div>
</div>

<!-- キャラクター詳細モーダル -->
<div class="modal-overlay" id="char-modal">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">キャラクター詳細</div>
      <button class="modal-close" onclick="document.getElementById('char-modal').classList.remove('show')">✕</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="font-size:48px" id="modal-icon"></div>
        <div>
          <div style="font-size:20px;font-weight:700" id="modal-name"></div>
          <div style="font-size:13px;color:var(--text-muted)" id="modal-class"></div>
          <span class="rarity-badge" id="modal-rarity"></span>
        </div>
      </div>
      <div id="modal-skills"></div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/characters.js"></script>
</body>
</html>
