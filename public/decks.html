<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デッキ編成 — Tabula-Piece</title>
  <link rel="stylesheet" href="css/deck.css">
</head>
<body>

<header class="page-header">
  <div class="page-title">デッキ編成</div>
  <nav class="nav-links">
    <a href="characters.html">キャラクター</a>
    <span id="user-name" class="nav-user"></span>
    <button id="logout-btn" class="nav-logout">ログアウト</button>
  </nav>
</header>

<div class="deck-container">

  <!-- デッキ名 -->
  <div class="deck-name-row">
    <span class="deck-name-label">デッキ名</span>
    <input type="text" class="deck-name-input" id="deck-name" value="マイデッキ" maxlength="24">
  </div>

  <!-- STEP 1: クラス選択 -->
  <div class="step-section">
    <div class="step-label">STEP 1 ─ クラス選択</div>
    <div class="class-selector" id="class-selector">
      <!-- decks.js で生成 -->
    </div>
  </div>

  <!-- STEP 2: 標準スロット -->
  <div class="step-section">
    <div class="step-label">STEP 2 ─ 駒キャラクター設定</div>
    <div class="deck-slots" id="deck-slots">
      <!-- decks.js で生成 -->
    </div>
  </div>

  <!-- STEP 3: クラス駒配置 -->
  <div class="step-section" id="class-board-section">
    <div class="step-label">STEP 3 ─ クラス駒配置 <span class="step-label-sub">自陣に自由に配置</span></div>
    <div class="class-board-wrap">
      <div class="class-board" id="class-board">
        <!-- decks.js で生成 -->
      </div>
      <div class="class-board-legend">
        <span class="legend-item"><span class="legend-std">駒</span> 通常駒の初期位置</span>
        <span class="legend-item"><span class="legend-cls">＋</span> クラス駒を配置</span>
      </div>
    </div>
  </div>

  <!-- アクションボタン -->
  <div class="deck-actions">
    <button class="btn btn-ghost" id="btn-save">保存</button>
    <button class="btn btn-gold" id="btn-start">対戦開始</button>
  </div>

</div>

<!-- キャラクター選択モーダル（ボトムシート） -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">キャラクターを選択</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-filter" id="modal-filter"></div>
    <div class="modal-body" id="modal-body">
      <!-- decks.js で生成 -->
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/decks.js"></script>
</body>
</html>
